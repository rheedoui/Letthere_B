[build]
builder = "NIXPACKS"

# ── Scrape service: runs every 6 hours ─────────────────────────────────────
[[services]]
name = "scrape"
startCommand = "python main.py scrape"
cronSchedule = "0 */6 * * *"

[services.build]
builder = "NIXPACKS"

# ── Post service: runs every 30 minutes ────────────────────────────────────
[[services]]
name = "post"
startCommand = "python main.py post"
cronSchedule = "*/30 * * * *"

[services.build]
builder = "NIXPACKS"

# ── Telegram bot: long-running approval listener ────────────────────────────
[[services]]
name = "bot"
startCommand = "python main.py bot"

[services.build]
builder = "NIXPACKS"

# ── Daily stats digest: every day at 09:00 UTC ──────────────────────────────
[[services]]
name = "stats"
startCommand = "python main.py stats"
cronSchedule = "0 9 * * *"

[services.build]
builder = "NIXPACKS"
